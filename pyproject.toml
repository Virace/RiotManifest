[project]
name = "riotmanifest"
version = "1.1.9"
description = "Add your description here"
authors = [
    { name = "Virace", email = "Virace@aliyun.com" }
]
dependencies = [
    "loguru>=0.7.3",
    "pyzstd>=0.19.1",
    "requests>=2.32.5",
    "aiohttp>=3.13.3",
    "league-tools>=1.1.1",
]
readme = "README.md"
license = "GPL-3.0"
requires-python = ">= 3.10"
homepage = "https://github.com/Virace/RiotManifest"
repository = "https://github.com/Virace/RiotManifest"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.uv]
managed = true

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/riotmanifest"]
